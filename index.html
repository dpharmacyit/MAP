<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dpharmacy Branch Locator</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

  <style>
    :root {
      --green:#08a76b;
      --green-dark:#007c50;
      --bg:#f4faf7;
      --card:#ffffff;
      --text:#172033;
      --muted:#667085;
      --line:#e6edf0;
      --shadow:0 18px 42px rgba(16,24,40,.12);
      --soft-shadow:0 8px 24px rgba(16,24,40,.08);
    }

    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; overflow:hidden; font-family:"Segoe UI", Tahoma, Arial, sans-serif; background:var(--bg); color:var(--text); }

    .app {
      display:grid;
      grid-template-columns:420px 1fr;
      grid-template-rows:92px 1fr;
      width:100vw;
      height:100vh;
    }

    .topbar {
      grid-column:1 / 3;
      background:rgba(255,255,255,.96);
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 24px;
      z-index:800;
      box-shadow:0 4px 20px rgba(16,24,40,.05);
    }

    .brand {
      display:flex;
      align-items:center;
      gap:22px;
      min-width:0;
    }

    .logo-img {
      width:250px;
      height:58px;
      object-fit:contain;
      object-position:left center;
    }

    .brand-title {
      border-left:1px solid #dde7eb;
      padding-left:22px;
      min-width:0;
    }

    .brand-title h1 {
      font-size:25px;
      color:#06945f;
      line-height:1.1;
      white-space:nowrap;
    }

    .brand-title p {
      color:#667085;
      font-size:14px;
      margin-top:5px;
      white-space:nowrap;
    }

    .search-global {
      display:flex;
      gap:12px;
      align-items:center;
      min-width:430px;
    }

    .search-global input {
      width:100%;
      height:52px;
      border:1px solid #d9e4ea;
      border-radius:16px;
      padding:0 18px;
      font-size:15px;
      outline:none;
      background:#fbfdff;
      box-shadow:0 4px 14px rgba(16,24,40,.04);
    }

    .search-global input:focus {
      border-color:#10b981;
      box-shadow:0 0 0 4px rgba(16,185,129,.12);
      background:white;
    }

    .about-btn {
      height:52px;
      padding:0 18px;
      border:1px solid #d9e4ea;
      background:#fff;
      border-radius:16px;
      color:#344054;
      font-weight:700;
      white-space:nowrap;
      cursor:pointer;
    }

    .sidebar {
      grid-column:1;
      grid-row:2;
      background:#f7fbf9;
      border-right:1px solid var(--line);
      padding:18px;
      overflow-y:auto;
      min-height:0;
    }

    .summary-card {
      background:linear-gradient(135deg,#12b981,#059669);
      border-radius:20px;
      color:white;
      padding:24px;
      box-shadow:0 18px 30px rgba(5,150,105,.22);
      display:flex;
      align-items:center;
      gap:20px;
      margin-bottom:14px;
    }

    .summary-icon {
      width:58px;
      height:58px;
      border-radius:18px;
      background:rgba(255,255,255,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:34px;
      font-weight:900;
      border:1px solid rgba(255,255,255,.25);
    }

    .summary-card .num {
      font-size:42px;
      font-weight:900;
      line-height:1;
    }

    .summary-card .label {
      font-size:15px;
      margin-top:6px;
      opacity:.95;
    }

    .panel {
      background:white;
      border-radius:20px;
      border:1px solid var(--line);
      box-shadow:var(--soft-shadow);
      overflow:hidden;
      margin-bottom:14px;
    }

    .panel-title {
      padding:18px;
      color:#068a58;
      font-size:17px;
      font-weight:900;
      border-bottom:1px solid var(--line);
    }

    .province-group {
      border-bottom:1px solid var(--line);
    }
    .province-group:last-child { border-bottom:0; }

    .province-head {
      width:100%;
      border:0;
      background:white;
      padding:17px 16px;
      display:flex;
      align-items:center;
      gap:13px;
      cursor:pointer;
      text-align:left;
    }

    .province-dot {
      width:27px;
      height:27px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:14px;
      font-weight:900;
      flex:0 0 auto;
      box-shadow:0 8px 18px rgba(16,24,40,.16);
    }

    .province-name {
      flex:1;
      font-size:16px;
      font-weight:900;
      color:#233044;
    }

    .province-count {
      padding:5px 12px;
      border-radius:999px;
      font-weight:900;
      font-size:13px;
      background:#eef8f3;
      color:#047857;
      white-space:nowrap;
    }

    .chev {
      color:#667085;
      font-size:18px;
      transition:.18s ease;
    }

    .province-group.closed .chev { transform:rotate(-90deg); }
    .province-group.closed .branch-list { display:none; }

    .branch-list {
      padding:0 12px 12px;
      background:#fbfefd;
    }

    .branch-item {
      display:grid;
      grid-template-columns:48px 1fr 34px;
      gap:10px;
      align-items:center;
      padding:13px 8px;
      border-top:1px solid #eef3f5;
      cursor:pointer;
      border-radius:14px;
      transition:.16s ease;
    }

    .branch-item:hover {
      background:#f0faf5;
      transform:translateX(2px);
    }

    .branch-logo {
      width:42px;
      height:42px;
      object-fit:contain;
      border-radius:10px;
      background:white;
    }

    .branch-name {
      font-weight:900;
      font-size:14px;
      color:#1d2939;
      line-height:1.25;
    }

    .branch-meta {
      margin-top:4px;
      color:#667085;
      font-size:12px;
      line-height:1.35;
    }

    .phone-icon {
      width:30px;
      height:30px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#059669;
      background:#eafaf2;
      font-size:15px;
    }

    .help-card {
      background:white;
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      box-shadow:var(--soft-shadow);
      display:flex;
      align-items:center;
      gap:14px;
    }

    .help-card img {
      width:74px;
      height:74px;
      object-fit:contain;
      border-radius:16px;
      background:#f8fbfa;
    }

    .help-card b {
      color:#059669;
      display:block;
      margin-bottom:5px;
      font-size:16px;
    }

    .help-card p {
      color:#667085;
      font-size:13px;
      line-height:1.45;
    }

    .map-wrap {
      grid-column:2;
      grid-row:2;
      position:relative;
      min-width:0;
    }

    #map {
      width:100%;
      height:100%;
      background:#e6f3ee;
    }

    .mode-tabs {
      position:absolute;
      top:20px;
      left:26px;
      z-index:650;
      background:white;
      border-radius:999px;
      padding:6px;
      box-shadow:var(--shadow);
      display:flex;
      gap:4px;
    }

    .mode-tab {
      border:0;
      padding:12px 22px;
      border-radius:999px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      background:transparent;
      color:#475467;
    }
    .mode-tab.active {
      background:#0aaa6d;
      color:white;
      box-shadow:0 8px 18px rgba(10,170,109,.25);
    }

    .legend {
      position:absolute;
      left:50%;
      bottom:22px;
      transform:translateX(-50%);
      z-index:650;
      background:rgba(255,255,255,.94);
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px 16px;
      display:flex;
      gap:18px;
      align-items:center;
      box-shadow:var(--shadow);
      max-width:90%;
      overflow:auto;
      white-space:nowrap;
    }

    .legend-item {
      display:flex;
      gap:7px;
      align-items:center;
      color:#475467;
      font-size:13px;
      font-weight:700;
    }

    .legend-dot {
      width:11px;
      height:11px;
      border-radius:999px;
      flex:0 0 auto;
    }

    .cluster-bubble {
      border-radius:999px;
      color:white;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      border:6px solid rgba(255,255,255,.66);
      box-shadow:0 0 0 10px rgba(16,185,129,.18), 0 10px 26px rgba(0,0,0,.16);
    }

    .branch-marker {
      width:38px;
      height:38px;
      border-radius:999px;
      background:white;
      border:3px solid white;
      box-shadow:0 9px 22px rgba(0,0,0,.26);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .branch-marker img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .leaflet-popup-content-wrapper {
      border-radius:22px;
      box-shadow:0 18px 50px rgba(0,0,0,.22);
    }

    .leaflet-popup-content { margin:0; }

    .popup-card {
      width: min(360px, calc(100vw - 56px));
      padding: 20px;
      overflow: hidden;
    }

    .popup-head {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 16px;
    }

    .popup-logo {
      width: 82px;
      height: 66px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .popup-chip {
      display: inline-flex;
      align-items: center;
      background: #e8f8f1;
      color: #047857;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 8px;
      max-width: 100%;
      white-space: nowrap;
    }

    .popup-title {
      font-size: 22px;
      font-weight: 950;
      line-height: 1.25;
      color: #1d2939;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .popup-row {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 12px;
      margin-top: 12px;
      color: #475467;
      font-size: 14px;
      line-height: 1.55;
      align-items: start;
    }

    .popup-row .ico {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: #ecfdf3;
      color: #059669;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      font-size: 14px;
    }

    .popup-text {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .leaflet-popup-content {
      max-width: calc(100vw - 44px);
    }

    .leaflet-popup-close-button {
      width: 34px !important;
      height: 34px !important;
      font-size: 22px !important;
      color: #667085 !important;
      top: 10px !important;
      right: 10px !important;
    }

    @media (max-width: 520px) {
      .popup-card {
        width: min(320px, calc(100vw - 48px));
        padding: 18px;
      }
      .popup-head {
        grid-template-columns: 74px 1fr;
        gap: 12px;
      }
      .popup-logo {
        width: 70px;
        height: 56px;
      }
      .popup-title {
        font-size: 19px;
      }
      
    .popup-nav {
      display:flex !important;
      align-items:center !important;
      justify-content:center !important;
      width:100% !important;
      height:48px !important;
      padding:0 12px !important;
      border-radius:14px !important;
      background: linear-gradient(135deg,#10b981,#059669) !important;
      color:white !important;
      text-decoration:none !important;
      font-size:13.5px !important;
      font-weight:950 !important;
      box-shadow: 0 10px 22px rgba(5,150,105,.20) !important;
      white-space: nowrap !important;
      overflow:hidden !important;
      text-overflow:ellipsis !important;
      box-sizing:border-box !important;
      margin-top:0 !important;
    }

    }
    

    .footer-contact {
      position:sticky;
      bottom:0;
      margin:14px -18px -18px;
      background:linear-gradient(135deg,#10b981,#047857);
      color:white;
      padding:16px 22px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-weight:900;
    }

    .footer-contact small {
      display:block;
      font-weight:600;
      opacity:.9;
      margin-bottom:3px;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns:1fr;
        grid-template-rows:84px 42vh 1fr;
      }
      .topbar { grid-column:1; padding:10px 14px; }
      .logo-img { width:190px; height:48px; }
      .brand-title { display:none; }
      .search-global { min-width:0; flex:1; }
      .about-btn { display:none; }
      .sidebar { grid-column:1; grid-row:2; }
      .map-wrap { grid-column:1; grid-row:3; }
      .legend { display:none; }
      .popup-card { width:300px; }
    }
  
    /* ===== Popup compact fixed size ===== */
    .leaflet-popup {
      max-width: 320px !important;
    }

    .leaflet-popup-content-wrapper {

    }

    }

    .popup-actions {

    .share-btn {

    .share-btn {
      display:flex !important;

      height:48px !important;
      padding:0 12px !important;

    .share-btn:hover {
      filter: brightness(.96);
    }

    .share-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .36);
      z-index: 99999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .share-modal {
      width: min(420px, calc(100vw - 36px));
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(16,24,40,.24);
      overflow: hidden;
      border: 1px solid #e6edf0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    }

    .share-modal-head {
      padding: 18px 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .share-modal-head b {
      font-size: 18px;
      color: #172033;
    }

    .share-modal-close {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 0;
      background: #f2f4f7;
      color: #667085;
      font-size: 20px;
      cursor: pointer;
    }

    .share-modal-body {
      padding: 0 20px 20px;
    }

    .share-modal-body p {
      color: #667085;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .share-url-box {
      width: 100%;
      min-height: 48px;
      border: 1px solid #d0d5dd;
      border-radius: 14px;
      padding: 12px;
      font-size: 13px;
      color: #344054;
      background: #f9fafb;
      resize: none;
      outline: none;
      word-break: break-all;
    }

    .copy-url-btn {
      width: 100%;
      margin-top: 12px;
      border: 0;
      border-radius: 14px;
      padding: 13px 14px;
      color: white;
      font-weight: 950;
      font-size: 14px;
      background: linear-gradient(135deg,#10b981,#059669);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(5,150,105,.20);
    }

    .copy-status {
      min-height: 18px;
      margin-top: 8px;
      font-size: 12px;
      color: #059669;
      font-weight: 800;
      text-align: center;
    }


    /* ===== Mobile responsive fix ===== */
    @media (max-width: 768px) {
      html, body {
        height: 100%;
        overflow: hidden !important;
      }

      .app {
        display: grid !important;
        grid-template-columns: 1fr !important;
        grid-template-rows: 72px 1fr !important;
        width: 100vw !important;
        height: 100vh !important;
      }

      .topbar {
        grid-column: 1 !important;
        grid-row: 1 !important;
        height: 72px !important;
        padding: 8px 10px !important;
        gap: 8px !important;
        align-items: center !important;
        position: relative !important;
        z-index: 1200 !important;
      }

      .brand {
        gap: 8px !important;
        flex: 0 0 auto !important;
        min-width: 72px !important;
      }

      .logo-img {
        width: 68px !important;
        height: 48px !important;
        object-fit: contain !important;
      }

      .brand-title {
        display: none !important;
      }

      .search-global {
        min-width: 0 !important;
        flex: 1 !important;
        gap: 6px !important;
      }

      .search-global input {
        height: 46px !important;
        min-width: 0 !important;
        padding: 0 12px !important;
        font-size: 14px !important;
        border-radius: 16px !important;
      }

      .about-btn {
        display: none !important;
      }

      .map-wrap {
        grid-column: 1 !important;
        grid-row: 2 !important;
        width: 100vw !important;
        height: calc(100vh - 72px) !important;
        min-height: 0 !important;
        position: relative !important;
      }

      #map {
        width: 100vw !important;
        height: calc(100vh - 72px) !important;
      }

      .sidebar {
        position: absolute !important;
        left: 10px !important;
        right: 10px !important;
        bottom: 10px !important;
        width: auto !important;
        height: auto !important;
        max-height: 38vh !important;
        min-height: 0 !important;
        grid-column: auto !important;
        grid-row: auto !important;
        z-index: 1000 !important;
        padding: 0 !important;
        border: 1px solid rgba(230,237,240,.95) !important;
        border-radius: 22px !important;
        background: rgba(255,255,255,.96) !important;
        box-shadow: 0 18px 45px rgba(16,24,40,.22) !important;
        overflow: hidden !important;
        backdrop-filter: blur(14px) !important;
      }

      .summary-card {
        display: none !important;
      }

      .panel {
        margin: 0 !important;
        border: 0 !important;
        border-radius: 22px !important;
        box-shadow: none !important;
        max-height: 38vh !important;
        overflow: hidden !important;
      }

      .panel-title {
        padding: 13px 16px !important;
        font-size: 15px !important;
        position: sticky !important;
        top: 0 !important;
        z-index: 2 !important;
        background: #fff !important;
      }

      #provinceGroups {
        max-height: calc(38vh - 50px) !important;
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch !important;
      }

      .province-head {
        padding: 13px 14px !important;
      }

      .province-dot {
        width: 22px !important;
        height: 22px !important;
        font-size: 11px !important;
      }

      .province-name {
        font-size: 14px !important;
      }

      .province-count {
        font-size: 12px !important;
        padding: 4px 9px !important;
      }

      .branch-list {
        padding: 0 8px 8px !important;
      }

      .branch-item {
        grid-template-columns: 38px 1fr 28px !important;
        gap: 8px !important;
        padding: 10px 6px !important;
      }

      .branch-logo {
        width: 32px !important;
        height: 32px !important;
      }

      .branch-name {
        font-size: 13px !important;
      }

      .branch-meta {
        font-size: 11px !important;
        line-height: 1.28 !important;
      }

      .phone-icon {
        width: 26px !important;
        height: 26px !important;
        font-size: 12px !important;
      }

      .help-card,
      .footer-contact {
        display: none !important;
      }

      .mode-tabs {
        top: 10px !important;
        left: 62px !important;
        padding: 4px !important;
        border-radius: 18px !important;
        z-index: 650 !important;
      }

      .mode-tab {
        padding: 9px 14px !important;
        font-size: 14px !important;
      }

      .legend {
        display: none !important;
      }

      .leaflet-control-zoom {
        margin-top: 10px !important;
        margin-left: 10px !important;
      }

      .leaflet-control-layers {
        margin-bottom: 48vh !important;
      }

      .leaflet-popup {
        max-width: 292px !important;
      }

      .leaflet-popup-content-wrapper {
        max-width: 292px !important;
      }

      .leaflet-popup-content {
        width: 276px !important;
        max-width: 276px !important;
      }

      .popup-card {
        width: 276px !important;
        max-width: 276px !important;
        padding: 16px !important;
      }

      .popup-head {
        grid-template-columns: 50px 1fr !important;
        gap: 10px !important;
      }

      .popup-logo {
        width: 46px !important;
        height: 42px !important;
      }

      .popup-title {
        max-width: 188px !important;
        font-size: 17px !important;
      }

      .popup-row {
        max-width: 244px !important;
        grid-template-columns: 22px 1fr !important;
        gap: 8px !important;
        font-size: 12px !important;
      }

      .popup-text {
        max-width: 214px !important;
      }

      .popup-actions {
        max-width: 244px !important;
        gap: 8px !important;
      }

      .popup-nav,
      .share-btn {
        height: 44px !important;
        font-size: 12.5px !important;
        border-radius: 13px !important;
      }
    }

</style>

const map = L.map('map', {
  zoomControl: true,
  scrollWheelZoom: true
}).setView([13.250555, 101.036052], 8);

const googleMap = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
  maxZoom: 20,
  subdomains:['mt0','mt1','mt2','mt3'],
  attribution: 'Map data © Google'
}).addTo(map);

const googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  maxZoom: 20,
  subdomains:['mt0','mt1','mt2','mt3'],
  attribution: 'Map data © Google'
});

L.control.layers({"Google Map": googleMap, "Google Hybrid": googleHybrid}, null, { position:'bottomright' }).addTo(map);

const markerCluster = L.markerClusterGroup({
  showCoverageOnHover: false,
  spiderfyOnMaxZoom: true,
  disableClusteringAtZoom: 15,
  maxClusterRadius: 58,
  iconCreateFunction: function(cluster) {
    const markers = cluster.getAllChildMarkers();
    const counts = {};
    markers.forEach(m => {
      const p = m.branchData.province || "อื่นๆ";
      counts[p] = (counts[p] || 0) + 1;
    });

    let topProvince = Object.keys(counts).sort((a,b) => counts[b] - counts[a])[0] || "อื่นๆ";
    let color = provinceColors[topProvince] || defaultColor;
    let count = cluster.getChildCount();

    let size = count >= 20 ? 62 : count >= 10 ? 56 : 50;
    return L.divIcon({
      html: `<div class="cluster-bubble" style="width:${size}px;height:${size}px;background:${color}">${count}</div>`,
      className: "",
      iconSize: [size, size]
    });
  }
});

function escapeHTML(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function navUrl(b) {
  return `https://www.google.com/maps/dir/?api=1&destination=${b.lat},${b.lng}`;
}

function colorOf(b) {
  return provinceColors[b.province] || defaultColor;
}

function makeIcon(b) {
  const color = colorOf(b);
  return L.divIcon({
    className: "",
    html: `<div class="branch-marker" style="outline:4px solid ${color}55"><img src="${logoSrc}" /></div>`,
    iconSize: [38,38],
    iconAnchor: [19,38],
    popupAnchor: [0,-36]
  });
}

const allMarkers = [];
const bounds = [];

branches.forEach((b, index) => {
  const popup = `
    <div class="popup-card">
      <div class="popup-head">
        <img class="popup-logo" src="${logoSrc}" alt="Dpharmacy">
        <div>
          <span class="popup-chip">สาขา${escapeHTML(b.province || '')}</span>
          <div class="popup-title">${escapeHTML(b.name)}</div>
        </div>
      </div>
      <div class="popup-row"><span class="ico">📍</span><span class="popup-text">${escapeHTML(b.address)}</span></div>
      <div class="popup-row"><span class="ico">☎</span><span class="popup-text">${escapeHTML(b.phone || '-')}</span></div>
      <div class="popup-actions">
          <a class="popup-nav" target="_blank" href="${navUrl(b)}">➤ นำทาง</a>
          <button class="share-btn" onclick='shareLocation(${JSON.stringify(b)})'>↗ แชร์</button>
        </div>
    </div>
  `;

  const marker = L.marker([b.lat,b.lng], { icon: makeIcon(b) }).bindPopup(popup, { maxWidth: 300, minWidth: 300, autoPan: true, keepInView: true });
  marker.branchData = b;
  markerCluster.addLayer(marker);
  allMarkers.push(marker);
  bounds.push([b.lat,b.lng]);
});

map.addLayer(markerCluster);
if (bounds.length) map.fitBounds(bounds, { padding:[40,40] });

function groupByProvince() {
  const order = Object.keys(provinceColors).filter(p => branches.some(b => b.province === p));
  const rest = [...new Set(branches.map(b => b.province))].filter(p => !order.includes(p));
  return [...order, ...rest].map(province => ({
    province,
    color: provinceColors[province] || defaultColor,
    items: branches.filter(b => b.province === province)
  }));
}

function renderGroups(filterText = "") {
  const q = filterText.trim().toLowerCase();
  const wrap = document.getElementById("provinceGroups");
  wrap.innerHTML = "";

  groupByProvince().forEach((group, groupIndex) => {
    const filtered = group.items.filter(b => (`${b.name} ${b.address} ${b.province} ${b.phone}`).toLowerCase().includes(q));
    if (!filtered.length) return;

    const div = document.createElement("div");
    div.className = "province-group" + (groupIndex > 0 && !q ? " closed" : "");

    div.innerHTML = `
      <button class="province-head" type="button">
        <span class="province-dot" style="background:${group.color}">●</span>
        <span class="province-name">จังหวัด${escapeHTML(group.province)}</span>
        <span class="province-count">${filtered.length} สาขา</span>
        <span class="chev">⌄</span>
      </button>
      <div class="branch-list"></div>
    `;

    const list = div.querySelector(".branch-list");

    filtered.forEach(b => {
      const item = document.createElement("div");
      item.className = "branch-item";
      item.innerHTML = `
        <img class="branch-logo" src="${logoSrc}" alt="logo">
        <div>
          <div class="branch-name">${escapeHTML(b.name)}</div>
          <div class="branch-meta">📍 ${escapeHTML(b.address)}<br>☎ ${escapeHTML(b.phone || '-')}</div>
        </div>
        <div class="phone-icon">☎</div>
      `;
      item.addEventListener("click", () => {
        const m = allMarkers.find(x => x.branchData.no === b.no);
        map.setView([b.lat,b.lng], 16, { animate:true });
        setTimeout(() => {
          markerCluster.zoomToShowLayer(m, () => m.openPopup());
        }, 260);
      });
      list.appendChild(item);
    });

    div.querySelector(".province-head").addEventListener("click", () => {
      div.classList.toggle("closed");
      const groupBounds = filtered.map(b => [b.lat,b.lng]);
      if (groupBounds.length) map.fitBounds(groupBounds, { padding:[60,60] });
    });

    wrap.appendChild(div);
  });
}

function renderLegend() {
  const legend = document.getElementById("legend");
  legend.innerHTML = "";
  groupByProvince().forEach(g => {
    const item = document.createElement("div");
    item.className = "legend-item";
    item.innerHTML = `<span class="legend-dot" style="background:${g.color}"></span><span>${g.province}</span><b>${g.items.length}</b>`;
    legend.appendChild(item);
  });
}

function applySearch(value) {
  const q = value.trim().toLowerCase();
  markerCluster.clearLayers();
  allMarkers.forEach(m => {
    const b = m.branchData;
    const text = `${b.name} ${b.address} ${b.province} ${b.phone}`.toLowerCase();
    if (!q || text.includes(q)) markerCluster.addLayer(m);
  });
  renderGroups(value);
}

document.getElementById("searchInput").addEventListener("input", (e) => applySearch(e.target.value));
document.getElementById("fitAllBtn").addEventListener("click", () => {
  document.getElementById("searchInput").value = "";
  applySearch("");
  if (bounds.length) map.fitBounds(bounds, { padding:[40,40] });
});

document.getElementById("mapTab").addEventListener("click", () => {
  document.getElementById("mapTab").classList.add("active");

function shareLocation(branch) {
  const mapsUrl = `https://www.google.com/maps?q=${branch.lat},${branch.lng}`;
  const input = document.getElementById("shareUrlInput");
  const modal = document.getElementById("shareModalBackdrop");
  const status = document.getElementById("copyStatus");

  input.value = mapsUrl;
  status.textContent = "";
  modal.style.display = "flex";

  setTimeout(() => {
    input.focus();
    input.select();
  }, 80);
}

function closeShareModal() {
  document.getElementById("shareModalBackdrop").style.display = "none";
}

function copyShareUrl() {
  const input = document.getElementById("shareUrlInput");
  const status = document.getElementById("copyStatus");
  input.focus();
  input.select();

  navigator.clipboard.writeText(input.value).then(() => {
    status.textContent = "คัดลอก URL แล้ว";
  }).catch(() => {
    document.execCommand("copy");
    status.textContent = "คัดลอก URL แล้ว";
  });
}


</script>

<div class="share-modal-backdrop" id="shareModalBackdrop" onclick="if(event.target === this) closeShareModal()">
  <div class="share-modal">
    <div class="share-modal-head">
      <b>แชร์ Location</b>
      <button class="share-modal-close" onclick="closeShareModal()">×</button>
    </div>
    <div class="share-modal-body">
      <p>คัดลอก URL Google Maps สำหรับสาขานี้</p>
      <textarea class="share-url-box" id="shareUrlInput" readonly></textarea>
      <button class="copy-url-btn" onclick="copyShareUrl()">คัดลอก URL</button>
      <div class="copy-status" id="copyStatus"></div>
    </div>
  </div>
</div>
